<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>uZone • Guest List</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <meta name="color-scheme" content="light" />

  <style>
    :root{
      --bg:#f7f7fb;
      --card:#ffffff;
      --card2:#fbfbff;
      --text:#14141b;
      --muted:#66687a;
      --border:#e7e8f0;
      --shadow:0 18px 50px rgba(20,20,27,.08);

      --accent:#6d28d9;
      --accent2:#b00b55;
      --good:#1f9d67;
      --goodBg:#eaf8f1;
      --danger:#c6285d;
      --dangerBg:#fdeef3;
    }

    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 0% 0%, rgba(109,40,217,.08), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, rgba(176,11,85,.07), transparent 60%),
        linear-gradient(180deg, #fbfbff 0%, #f7f7fb 100%);
    }

    button,input{font:inherit}
    a{color:inherit;text-decoration:none}

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(20,20,27,.06);
    }

    .topbar{
      width:min(980px,92vw);
      margin:0 auto;
      padding:14px 0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand img{
      width:42px;
      height:42px;
      border-radius:12px;
      object-fit:cover;
      border:1px solid var(--border);
      background:#fff;
    }

    .brandText{
      display:grid;
      gap:2px;
    }

    .brandText b{
      font-size:15px;
      letter-spacing:.2px;
    }

    .brandText span{
      font-size:12px;
      color:var(--muted);
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      font-size:12px;
      font-weight:800;
      color:#3d4053;
      max-width:min(360px,80vw);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:14px;
      padding:11px 14px;
      font-weight:900;
      transition:.15s ease;
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 28px rgba(20,20,27,.07);
    }

    .btn.primary{
      background:linear-gradient(135deg, rgba(109,40,217,.12), rgba(176,11,85,.10));
      border-color:rgba(109,40,217,.18);
    }

    .btn.good{
      background:var(--goodBg);
      color:var(--good);
      border-color:rgba(31,157,103,.18);
    }

    .btn.danger{
      background:var(--dangerBg);
      color:var(--danger);
      border-color:rgba(198,40,93,.18);
    }

    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    main{
      width:min(980px,92vw);
      margin:28px auto 50px;
      display:grid;
      gap:18px;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.88));
      border:1px solid rgba(255,255,255,.7);
      box-shadow:var(--shadow);
      border-radius:24px;
      overflow:hidden;
    }

    .cardInner{
      padding:22px;
    }

    .title{
      margin:0;
      font-size:24px;
      letter-spacing:.2px;
    }

    .sub{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
      line-height:1.5;
    }

    .field{
      display:grid;
      gap:8px;
      margin-top:18px;
    }

    .field label{
      font-size:13px;
      font-weight:800;
      color:#303244;
    }

    .input{
      width:100%;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:13px 14px;
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85);
    }

    .input:focus{
      border-color:rgba(109,40,217,.35);
      box-shadow:0 0 0 4px rgba(109,40,217,.10);
    }

    .searchShell{
      position:relative;
    }

    .dropdown{
      position:absolute;
      top:calc(100% + 8px);
      left:0;
      right:0;
      z-index:30;
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 18px 40px rgba(20,20,27,.10);
      padding:10px;
      display:none;
      max-height:360px;
      overflow:auto;
    }

    .dropdown.open{display:block}

    .resultItem{
      display:grid;
      grid-template-columns:56px 1fr auto;
      gap:12px;
      align-items:center;
      padding:10px;
      border-radius:14px;
      border:1px solid transparent;
      background:#fff;
      transition:.12s ease;
      margin-bottom:8px;
    }

    .resultItem:last-child{margin-bottom:0}

    .resultItem:hover{
      background:#faf9ff;
      border-color:#ece7ff;
    }

    .avatar{
      width:56px;
      height:56px;
      border-radius:999px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:1000;
      color:#fff;
      background:linear-gradient(135deg, var(--accent2), var(--accent));
      border:1px solid rgba(20,20,27,.08);
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .resultMain{
      min-width:0;
      display:grid;
      gap:6px;
    }

    .name{
      font-size:15px;
      font-weight:950;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .meta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      font-size:12px;
      font-weight:850;
      color:#44485d;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .pill.good{
      background:var(--goodBg);
      color:var(--good);
      border-color:rgba(31,157,103,.18);
    }

    .list{
      display:grid;
      gap:10px;
      margin-top:18px;
    }

    .guestRow{
      display:grid;
      grid-template-columns:56px 1fr auto;
      gap:12px;
      align-items:center;
      padding:12px;
      border-radius:18px;
      border:1px solid var(--border);
      background:#fff;
    }

    .empty{
      padding:16px;
      border-radius:16px;
      border:1px dashed #d9dbe7;
      color:var(--muted);
      background:#fcfcff;
      font-size:13px;
      line-height:1.45;
      margin-top:18px;
    }

    .msg{
      display:none;
      margin-top:14px;
      padding:13px 14px;
      border-radius:14px;
      font-size:13px;
      line-height:1.45;
      white-space:pre-line;
      border:1px solid var(--border);
      background:#fff;
      color:#43465c;
    }

    .msg.ok{
      display:block;
      background:var(--goodBg);
      color:#166b47;
      border-color:rgba(31,157,103,.18);
    }

    .msg.error{
      display:block;
      background:var(--dangerBg);
      color:#8b1842;
      border-color:rgba(198,40,93,.18);
    }

    .guestTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }

    .count{
      font-size:13px;
      color:var(--muted);
      font-weight:800;
    }

    @media (max-width:700px){
      .resultItem,.guestRow{
        grid-template-columns:56px 1fr;
      }

      .resultItem > .btn,
      .guestRow > .btn{
        grid-column:1 / -1;
        justify-self:start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <img src="logo.png" alt="uZone logo" />
        <div class="brandText">
          <b>uZone • Guest List</b>
          <span id="subline">Checking sign-in…</span>
        </div>
      </div>
      <span class="chip" id="userChip">User: —</span>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="cardInner">
        <h1 class="title">Guest List</h1>
        <div class="sub">Search users by name, email, or U# and add them to the guest list. Remove them anytime.</div>

        <div class="field">
          <label for="userSearchInput">Search users</label>
          <div class="searchShell">
            <input
              id="userSearchInput"
              class="input"
              type="search"
              placeholder="Search by name, email, or U#"
              autocomplete="off"
            />
            <div id="searchDropdown" class="dropdown"></div>
          </div>
        </div>

        <div id="msg" class="msg" aria-live="polite"></div>

        <div class="guestTop">
          <h2 class="title" style="font-size:18px;">Guest List</h2>
          <div class="count" id="guestCount">0 users</div>
        </div>

        <div id="guestList" class="list"></div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getAnalytics, isSupported as analyticsSupported } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-analytics.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
    import {
      getDatabase,
      ref,
      onValue,
      set,
      remove
    } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
    import {
      getFirestore,
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD_k18vbiBsLhQB7PzgEVT9PEI_30Mu0kg",
      authDomain: "uzone-6148d.firebaseapp.com",
      databaseURL: "https://uzone-6148d-default-rtdb.firebaseio.com",
      projectId: "uzone-6148d",
      storageBucket: "uzone-6148d.firebasestorage.app",
      messagingSenderId: "88783701381",
      appId: "1:88783701381:web:4f6c4b1ad8b26d6fa6f0ec",
      measurementId: "G-HKL5246YMC"
    };

    const app = initializeApp(firebaseConfig);
    try { if (await analyticsSupported()) getAnalytics(app); } catch (_) {}

    const auth = getAuth(app);
    const db = getDatabase(app);
    const fdb = getFirestore(app);

    const els = {
      subline: document.getElementById("subline"),
      userChip: document.getElementById("userChip"),
      userSearchInput: document.getElementById("userSearchInput"),
      searchDropdown: document.getElementById("searchDropdown"),
      guestList: document.getElementById("guestList"),
      guestCount: document.getElementById("guestCount"),
      msg: document.getElementById("msg")
    };

    let allUsers = [];
    let guestList = {};

    function showMsg(text = "", kind = "") {
      els.msg.textContent = text;
      els.msg.className = "msg";
      if (!text) {
        els.msg.style.display = "none";
        return;
      }
      els.msg.style.display = "block";
      if (kind) els.msg.classList.add(kind);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[m]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("\n", " ").replaceAll("\r", " ");
    }

    function norm(value) {
      return String(value ?? "").trim().toLowerCase();
    }

    function displayName(user) {
      return (user?.name && user.name.trim())
        ? user.name.trim()
        : (user?.displayName && user.displayName.trim())
        ? user.displayName.trim()
        : (user?.email && user.email.trim())
        ? user.email.trim()
        : "Unnamed user";
    }

    function publicId(user) {
      return String(user?.publicId ?? user?.publicID ?? "").trim() || "U?";
    }

    function avatarHtml(user) {
      const src = user?.photoURL || user?.photoUrl || user?.avatarUrl || user?.avatar || "";
      if (src) {
        return `<div class="avatar"><img src="${escapeAttr(src)}" alt="Avatar"></div>`;
      }
      return `<div class="avatar">${escapeHtml(displayName(user).charAt(0).toUpperCase() || "?")}</div>`;
    }

    function guestListRef() {
      return ref(db, "guestList");
    }

    function filteredUsers() {
      const q = norm(els.userSearchInput.value);
      if (!q) return [];

      return allUsers
        .filter(user => {
          const blob = [
            displayName(user),
            user.email || "",
            publicId(user),
            user.__uid || ""
          ].join(" ").toLowerCase();

          return blob.includes(q);
        })
        .sort((a, b) => displayName(a).localeCompare(displayName(b)))
        .slice(0, 25);
    }

    function renderDropdown() {
      const q = norm(els.userSearchInput.value);
      const results = filteredUsers();

      if (!q) {
        els.searchDropdown.classList.remove("open");
        els.searchDropdown.innerHTML = "";
        return;
      }

      if (!results.length) {
        els.searchDropdown.innerHTML = `<div class="empty" style="margin-top:0;">No users found.</div>`;
        els.searchDropdown.classList.add("open");
        return;
      }

      els.searchDropdown.innerHTML = results.map(user => {
        const alreadyOnList = !!guestList[user.__uid];
        return `
          <div class="resultItem" data-uid="${escapeAttr(user.__uid)}">
            ${avatarHtml(user)}
            <div class="resultMain">
              <div class="name">${escapeHtml(displayName(user))}</div>
              <div class="meta">
                <span class="pill">🆔 ${escapeHtml(publicId(user))}</span>
                ${user.email ? `<span class="pill">${escapeHtml(user.email)}</span>` : ""}
                ${alreadyOnList ? `<span class="pill good">Already added</span>` : ``}
              </div>
            </div>
            <button class="btn good addBtn" type="button" ${alreadyOnList ? "disabled" : ""}>Add</button>
          </div>
        `;
      }).join("");

      els.searchDropdown.classList.add("open");

      els.searchDropdown.querySelectorAll(".resultItem").forEach(item => {
        const addBtn = item.querySelector(".addBtn");
        addBtn?.addEventListener("click", async (e) => {
          e.preventDefault();
          e.stopPropagation();

          const uid = item.getAttribute("data-uid");
          const user = allUsers.find(u => u.__uid === uid);
          if (!user) return;

          await set(ref(db, `guestList/${uid}`), {
            uid,
            name: displayName(user),
            displayName: user.displayName || "",
            email: user.email || "",
            publicId: publicId(user)
          });

          els.userSearchInput.value = "";
          els.searchDropdown.classList.remove("open");
          els.searchDropdown.innerHTML = "";
          showMsg(`${displayName(user)} added to guest list.`, "ok");
        });
      });
    }

    function renderGuestList() {
      const entries = Object.entries(guestList || {}).map(([uid, value]) => ({ uid, ...value }));
      entries.sort((a, b) => {
        const an = String(a.name || a.displayName || a.email || "").toLowerCase();
        const bn = String(b.name || b.displayName || b.email || "").toLowerCase();
        return an.localeCompare(bn);
      });

      els.guestCount.textContent = `${entries.length} user${entries.length === 1 ? "" : "s"}`;
      els.guestList.innerHTML = "";

      if (!entries.length) {
        els.guestList.innerHTML = `<div class="empty">No one is on the guest list yet.</div>`;
        return;
      }

      const frag = document.createDocumentFragment();

      for (const guest of entries) {
        const row = document.createElement("div");
        row.className = "guestRow";

        row.innerHTML = `
          ${avatarHtml(guest)}
          <div class="resultMain">
            <div class="name">${escapeHtml(guest.name || guest.displayName || guest.email || "Unknown user")}</div>
            <div class="meta">
              <span class="pill">🆔 ${escapeHtml(guest.publicId || "U?")}</span>
              ${guest.email ? `<span class="pill">${escapeHtml(guest.email)}</span>` : ""}
              <span class="pill good">On guest list</span>
            </div>
          </div>
          <button class="btn danger" type="button">Remove</button>
        `;

        row.querySelector("button")?.addEventListener("click", async () => {
          await remove(ref(db, `guestList/${guest.uid}`));
          showMsg(`${guest.name || guest.email || "User"} removed from guest list.`, "ok");
        });

        frag.appendChild(row);
      }

      els.guestList.appendChild(frag);
    }

    async function loadUsers() {
      try {
        const snap = await getDocs(collection(fdb, "users"));
        const users = [];
        snap.forEach(docSnap => {
          const data = docSnap.data() || {};
          data.__uid = docSnap.id;
          users.push(data);
        });
        allUsers = users;
        renderDropdown();
      } catch (error) {
        console.error(error);
        showMsg("Could not load users.", "error");
      }
    }

    function startGuestListListener() {
      onValue(guestListRef(), (snap) => {
        guestList = snap.val() || {};
        renderGuestList();
        renderDropdown();
      }, (error) => {
        console.error(error);
        showMsg("Could not load guest list.", "error");
      });
    }

    els.userSearchInput.addEventListener("input", renderDropdown);
    els.userSearchInput.addEventListener("focus", renderDropdown);

    document.addEventListener("click", (e) => {
      const inside = els.searchDropdown.contains(e.target) || els.userSearchInput.contains(e.target);
      if (!inside) els.searchDropdown.classList.remove("open");
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        location.href = "index.html";
        return;
      }

      const who = user.displayName?.trim() || user.email || "Signed in user";
      els.userChip.textContent = `User: ${who}`;
      els.subline.textContent = "Signed in";

      await loadUsers();
      startGuestListListener();
    });
  </script>
</body>
</html>
