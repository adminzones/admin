<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uzone Admin • Login</title>

<style>

:root{
  --bg:#f7f7fb;
  --card:#ffffff;
  --accent:#b00b55;
  --text:#111018;
  --muted:#6b6b75;
  --border:rgba(0,0,0,.08);
  --shadow:0 18px 50px rgba(0,0,0,.08);
  --radius:18px;
}

*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  display:grid;
  place-items:center;
  background:
  radial-gradient(900px 500px at 20% 10%, rgba(176,11,85,.10), transparent),
  radial-gradient(900px 500px at 80% 90%, rgba(109,40,217,.10), transparent),
  var(--bg);
}

.wrap{
  width:min(900px,92vw);
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:20px;
}

@media(max-width:850px){
  .wrap{grid-template-columns:1fr;}
}

.brand,.card{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

.brand{
  padding:30px;
}

.logoRow{
  display:flex;
  gap:12px;
  align-items:center;
}

.logoRow img{
  width:44px;
}

.brand h1{
  margin:0;
}

.brand p{
  color:var(--muted);
  margin-top:12px;
}

.card{
  padding:24px;
}

.form{
  display:grid;
  gap:12px;
}

label{
  font-size:13px;
  color:var(--muted);
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
}

input:focus{
  outline:none;
  border-color:var(--accent);
}

.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#b00b55,#6d28d9);
  color:white;
  font-weight:700;
  cursor:pointer;
}

.msg{
  display:none;
  padding:10px;
  border-radius:10px;
  font-size:13px;
}

.msg.error{
  background:#ffd9df;
}

.msg.ok{
  background:#d6ffe7;
}

.smallLink{
  font-size:13px;
  color:var(--accent);
  cursor:pointer;
}

</style>
</head>

<body>

<main class="wrap">

<section class="brand">
<div class="logoRow">
<img src="logo.png">
<h1>Uzone Admin</h1>
</div>

<p>
Admin sign-in dashboard.
<br><br>
Only approved admin emails can proceed.
</p>

</section>

<section class="card">

<form class="form" id="authForm">

<label>
Email
<input id="email" type="email" required>
</label>

<label>
Password
<input id="password" type="password" required>
</label>

<button class="btn" id="submitBtn">Login</button>

<div class="msg" id="msgBox"></div>

<span class="smallLink" id="forgotPw">Forgot password?</span>

</form>

</section>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signInWithEmailAndPassword,
sendPasswordResetEmail,
signOut
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const ADMIN_EMAILS = [
"uzoneconf@gmail.com"
].map(s=>s.toLowerCase());

const firebaseConfig = {
apiKey:"AIzaSyD_k18vbiBsLhQB7PzgEVT9PEI_30Mu0kg",
authDomain:"uzone-6148d.firebaseapp.com",
projectId:"uzone-6148d",
storageBucket:"uzone-6148d.firebasestorage.app",
messagingSenderId:"88783701381",
appId:"1:88783701381:web:4f6c4b1ad8b26d6fa6f0ec"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const form=document.getElementById("authForm");
const msgBox=document.getElementById("msgBox");
const emailEl=document.getElementById("email");
const pwEl=document.getElementById("password");
const forgotPw=document.getElementById("forgotPw");

function setMsg(text,kind=""){
msgBox.style.display=text?"block":"none";
msgBox.textContent=text||"";
msgBox.className="msg "+kind;
}

function isAllowedAdmin(user){
const email=(user?.email||"").toLowerCase();
return ADMIN_EMAILS.includes(email);
}

onAuthStateChanged(auth,(user)=>{
if(!user) return;

if(!isAllowedAdmin(user)){
setMsg("Account not allowed","error");
signOut(auth);
return;
}

window.location.href="hub.html";
});

forgotPw.onclick=async()=>{
const email=emailEl.value.trim();
if(!email){
setMsg("Enter email first","error");
return;
}

try{
await sendPasswordResetEmail(auth,email);
setMsg("Reset email sent","ok");
}catch(err){
setMsg(err.message,"error");
}
};

form.onsubmit=async(e)=>{
e.preventDefault();

try{

const cred=await signInWithEmailAndPassword(
auth,
emailEl.value.trim(),
pwEl.value
);

if(!isAllowedAdmin(cred.user)){
setMsg("Not an admin","error");
await signOut(auth);
return;
}

setMsg("Redirecting...","ok");

window.location.href="hub.html";

}catch(err){
setMsg(err.message,"error");
}

};

</script>

</body>
</html>
